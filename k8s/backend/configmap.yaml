# =============================================================================
# Backend ConfigMap — non-sensitive configuration
#
# What goes here vs in a Secret:
#   ConfigMap: hostnames, ports, db name, user name, JWT issuer/audience,
#              algorithm choices, expiration windows. Visible to anyone
#              with `kubectl get cm -n dsl` — but none of these
#              values give an attacker capability on their own.
#   Secret:    DB_PASSWORD and JWT_SECRET. Sourced from AWS Secrets Manager
#              via ESO ExternalSecrets, NOT defined here.
#
# In prod you'd templatize these via Helm/kustomize per environment.
# For the lab, hard-coded is fine.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dsl
data:
  # Database connection (in-cluster postgres)
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "devseclab"
  DB_USER: "sql_lab_user"
  DB_SSL: "false"

  # JWT validation
  JWT_ALGS: "HS256"
  JWT_EXPIRATION: "3600"

  # Entra ID — real values for Igor's tenant.
  # These are NOT secrets (tenant + app IDs are public OAuth metadata) so
  # they belong in the ConfigMap. Any Entra client SECRETS, if used, would
  # go through ESO + AWS Secrets Manager.
  #
  # Backend uses the v2.0 discovery endpoint (see authJwt.js line 27), so
  # token issuer claim is the v2.0-form URL with the trailing /v2.0.
  # JWT_AUDIENCE for v2.0 tokens is typically just the API app's clientId
  # (no api:// prefix). If validation fails with "audience mismatch", flip
  # to "api://af63b7cb-1958-4029-b50c-3f2c17655120" — depends on the API
  # app manifest's accessTokenAcceptedVersion setting.
  ENTRA_TENANT_ID: "487f7bd9-65ec-4967-83e5-94f06e11b6d1"
  JWT_ISSUER: "https://login.microsoftonline.com/487f7bd9-65ec-4967-83e5-94f06e11b6d1/v2.0"
  JWT_AUDIENCE: "af63b7cb-1958-4029-b50c-3f2c17655120"

  # App
  PORT: "5001"

  # CORS — comma-separated allowlist consumed by backend/index.js.
  # Entries: exact origin (https://host) or wildcard suffix (*.domain.tld).
  # Add new front-end origins here, no code change / image rebuild required.
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://devseclab.local,https://lab.oznetsecure.com.au,*.app.github.dev"
