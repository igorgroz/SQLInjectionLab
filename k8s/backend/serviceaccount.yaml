# =============================================================================
# Backend ServiceAccount — IRSA-bound to sqlinj-eks-backend-role
#
# The Terraform IRSA module pins this SA's identity into the role's trust
# policy: `system:serviceaccount:sqlinj:sqlinj-backend-sa`. So the SA name
# CANNOT be changed without re-applying Terraform.
#
# Why does the backend need IRSA at all if ESO already syncs its secrets?
# In this lab, technically it doesn't — the backend reads K8s Secrets that
# ESO populated. But in prod, the backend often needs direct AWS access
# beyond what's been synced: e.g., generating pre-signed S3 URLs, calling
# SQS, writing CloudWatch metrics. Wiring the IRSA SA now means those
# capabilities are one IAM policy edit away, with zero pod or deployment
# changes needed.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sqlinj-backend-sa
  namespace: sqlinj
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::510151297987:role/sqlinj-eks-backend-role
