apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: sqlinj
type: Opaque
# ──────────────────────────────────────────────────────────────────────────────
# TEMPLATE FILE — do not commit real credentials.
# Populate from a secrets manager (AWS Secrets Manager, Azure Key Vault,
# HashiCorp Vault) or use the ExternalSecrets operator (see Helm charts).
# For local testing, copy to secret.local.yaml (gitignored) and fill in values.
# ──────────────────────────────────────────────────────────────────────────────
stringData:
  DB_HOST: db
  DB_PORT: "5432"
  DB_NAME: sqlinjproject
  DB_USER: sql_lab_user
  DB_PASSWORD: "<CHANGE_ME>"
  DB_SSL: "false"
  JWT_ALGS: HS256
  JWT_SECRET: "<CHANGE_ME — generate with: node -e \"require('crypto').randomBytes(64).toString('hex')|console.log\">"
  JWT_EXPIRATION: "3600"
  ENTRA_TENANT_ID: "<your-tenant-id>"
  JWT_ISSUER: "https://sts.windows.net/<your-tenant-id>/"
  JWT_AUDIENCE: "api://<your-api-app-id>"
  PORT: "5001"
