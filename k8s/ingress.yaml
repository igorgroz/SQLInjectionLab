# =============================================================================
# dsl-ingress — EKS edition (AWS Load Balancer Controller)
#
# Changes from the nginx-Ingress (minikube) version:
#   - ingressClassName: alb (provisions an AWS ALB, reconciled by ALBC)
#   - alb.ingress.kubernetes.io/scheme: internet-facing (public ALB)
#   - alb.ingress.kubernetes.io/target-type: ip (target Pod IPs directly,
#     no NodePort hop — works because we use the AWS VPC CNI which gives
#     every Pod a real VPC IP routable inside the VPC)
#   - listen-ports: HTTP 80 + HTTPS 443
#   - ACM cert wired via alb.ingress.kubernetes.io/certificate-arn (cert
#     for lab.oznetsecure.com.au lives in ap-southeast-2, preserved across
#     lab teardowns per SESSION_STATE)
#   - ssl-redirect=443 forces all HTTP traffic to HTTPS at the ALB
#   - ssl-policy pinned to a modern TLS 1.2+ baseline (ELBSecurityPolicy-
#     TLS13-1-2-2021-06 enables TLS 1.3, forbids 1.0/1.1, no RC4/3DES)
#   - host rule removed: ALB exposes a generated DNS name; the public
#     hostname lab.oznetsecure.com.au is a CNAME to that ALB DNS
#     (CNAME lives in GoDaddy DNS)
#
# After apply, get the ALB DNS for the CNAME target:
#   kubectl get ingress dsl-ingress -n dsl -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
# Reconciliation takes ~3 minutes from apply to ALB ready.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsl-ingress
  namespace: dsl
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    # Lab-only ingress lockdown: ALBC writes this CIDR list directly into
    # the managed SG ingress rules. WITHOUT this, ALBC defaults to
    # 0.0.0.0/0 and will revert any manual SG edits on next reconcile.
    # Update this list when your home IP rotates.
    alb.ingress.kubernetes.io/inbound-cidrs: "112.213.131.214/32"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-southeast-2:510151297987:certificate/b541a915-7d0d-4123-b32c-93cc8abdbecd"
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    # Optional, useful for diagnostics: tag the ALB so it's findable in the AWS console
    alb.ingress.kubernetes.io/tags: "Project=dsl,Environment=lab,ManagedBy=albc"
    # Health check now over HTTPS-able backend (still HTTP between ALB and pod)
    alb.ingress.kubernetes.io/healthcheck-path: "/"
    alb.ingress.kubernetes.io/healthcheck-protocol: "HTTP"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Static frontend (React SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # Backend REST API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001

          # Backend GraphQL endpoints (insecure + secure variants)
          - path: /graphql-insecure
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
          - path: /graphql-secure
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001

          # Backend health endpoint (also useful for ALB target group health checks)
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5001
