# =============================================================================
# ClusterSecretStore — AWS Secrets Manager backend for ESO
#
# Why ClusterSecretStore (cluster-scoped) vs SecretStore (namespace-scoped):
#   - ClusterSecretStore is shared across all namespaces. Any ExternalSecret
#     in any namespace can reference it. Simpler for the lab.
#   - SecretStore would be namespace-scoped — used in prod when different
#     teams need different IAM roles per namespace (one SecretStore per ns,
#     each pointing at its own SA / role).
#
# Why auth.jwt.serviceAccountRef instead of leaving auth empty:
#   - With auth empty, ESO falls back to the controller pod's default credential
#     chain (which on EKS picks up the controller's IRSA env vars/projected
#     token). That works, but it's implicit.
#   - With auth.jwt explicitly pointing at external-secrets-sa, the YAML itself
#     documents which identity is used, and the same store could later be
#     pointed at a DIFFERENT SA (e.g., a per-tenant SA with a tighter role)
#     without redeploying ESO. ESO needs the TokenRequest permission on that
#     SA — bundled into the chart's default ClusterRole.
#
# Verification after apply (tomorrow):
#   kubectl get clustersecretstore aws-secrets-manager
#   #  STATUS column should say "Valid"
#   kubectl describe clustersecretstore aws-secrets-manager
#   #  Look for: Reason: Validated, Message: store validated
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2

      # IRSA via JWT auth — ESO will request a token for this SA from the
      # K8s API server (TokenRequest), then exchange it at AWS STS for
      # short-lived credentials matching sqlinj-eks-eso-role's permissions.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
