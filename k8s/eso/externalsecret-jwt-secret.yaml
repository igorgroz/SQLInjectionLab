# =============================================================================
# ExternalSecret — sqlinj/backend/jwt-secret
#
# JWT signing/verification secret for the backend's authJwt.js. Rotation
# semantics for JWT secrets are notably trickier than for DB passwords:
#   - If you swap the secret atomically, ALL existing tokens become invalid
#     immediately. Users get 401, kicked back to the IdP.
#   - In prod you'd implement key-id (kid) rotation with overlap: keep N+1
#     keys live, sign with the newest, validate against any. Out of scope
#     here but worth noting.
#
# For the lab we keep one key, refresh hourly. Treat this as the "current"
# signing key; any rotation is a hard cut.
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: sqlinj
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: jwt-secret
    creationPolicy: Owner
    template:
      type: Opaque

  data:
    - secretKey: secret
      remoteRef:
        key: sqlinj/backend/jwt-secret
