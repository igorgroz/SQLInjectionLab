# =============================================================================
# ExternalSecret — sqlinj/backend/db-password
#
# Declares: "There should be a K8s Secret in namespace 'sqlinj' named
# 'db-password' whose value comes from AWS Secrets Manager secret
# 'sqlinj/backend/db-password', refreshed every hour."
#
# Lifecycle:
#   - On apply, ESO calls aws secretsmanager:GetSecretValue using its IRSA
#     identity, then creates the K8s Secret.
#   - On refreshInterval tick, ESO re-fetches and updates the K8s Secret IF
#     the AWS value has changed. Pods consuming the Secret via envFrom will
#     NOT auto-restart; volume mounts WILL get the new value within ~1 min
#     (kubelet sync). Use rotation-aware deployment for env consumers.
#   - On delete (kubectl delete externalsecret), creationPolicy=Owner means
#     the K8s Secret is also deleted. Switch to "Orphan" if you want the
#     Secret to outlive the ExternalSecret (rare).
#
# Verification:
#   kubectl get externalsecret db-password -n sqlinj
#   #  SYNCED=True, READY=True, STATUS=SecretSynced
#   kubectl get secret db-password -n sqlinj -o jsonpath='{.data.password}' | base64 -d
#   #  Should equal what's in AWS Secrets Manager
#
# Rotation test:
#   aws secretsmanager put-secret-value \
#     --secret-id sqlinj/backend/db-password \
#     --secret-string "new-rotated-value"
#   #  Wait up to refreshInterval (1h) OR force refresh:
#   kubectl annotate externalsecret db-password -n sqlinj force-sync=$(date +%s) --overwrite
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-password
  namespace: sqlinj
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: db-password
    creationPolicy: Owner
    # The K8s Secret type — Opaque is generic. Could be "kubernetes.io/tls"
    # for TLS material, "kubernetes.io/dockerconfigjson" for image-pull, etc.
    template:
      type: Opaque

  data:
    # Map the entire AWS secret value to the "password" key in K8s.
    # If the AWS secret were structured JSON (e.g. {"username":"x","password":"y"}),
    # we'd use spec.dataFrom or a property selector to extract one field.
    - secretKey: password
      remoteRef:
        key: sqlinj/backend/db-password
