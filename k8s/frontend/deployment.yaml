apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sqlinj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sqlinjproject-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080  # nginx-unprivileged listens on 8080 (non-root)
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101  # nginx user in nginxinc/nginx-unprivileged:alpine
            allowPrivilegeEscalation: false
