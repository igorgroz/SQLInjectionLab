# =============================================================================
# Postgres Deployment — EKS edition
#
# Changes from the minikube version:
#   - envFrom: split into ConfigMap (POSTGRES_DB, POSTGRES_USER) +
#     explicit valueFrom for POSTGRES_PASSWORD sourced from the SAME
#     ESO-managed `db-password` Secret the backend reads — single source
#     of truth across the password.
#   - PVC remains; on EKS the default StorageClass dynamically provisions gp2
#     (or gp3 if you've changed the default). No manifest change needed.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: dsl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: postgres:16
          ports:
            - containerPort: 5432

          # Non-sensitive postgres init values
          envFrom:
            - configMapRef:
                name: db-config

          # Password comes from the same ESO-managed Secret the backend uses
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-password   # synced by ESO from dsl/backend/db-password
                  key: password

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              # Postgres complains if the data dir is the volume root because
              # of lost+found etc. Use a subPath so it lives in a clean subdir.
              subPath: pgdata
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sql_lab_user
                - -d
                - devseclab
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - sql_lab_user
                - -d
                - devseclab
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            # postgres:16 requires root to initialise the data directory — accepted risk.
            # Privilege escalation is explicitly blocked below.
            runAsNonRoot: false # nosemgrep: yaml.kubernetes.security.run-as-non-root-unsafe-value.run-as-non-root-unsafe-value
            allowPrivilegeEscalation: false
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-sql
          configMap:
            name: db-init-sql
