# =============================================================================
# DB ConfigMap — non-sensitive postgres init configuration
#
# POSTGRES_DB and POSTGRES_USER are not secrets; they only constrain *what*
# database/user gets initialised on first startup. The actual access control
# is enforced by POSTGRES_PASSWORD (which the backend must know).
#
# IMPORTANT: POSTGRES_PASSWORD is consumed via env-from-Secret in the
# Deployment, NOT from this ConfigMap. The single source of truth for the
# DB password is `db-password` Secret (synced by ESO from AWS Secrets
# Manager `sqlinj/backend/db-password`). Both this DB pod AND the backend
# pod read from the same Secret — so when ESO rotates, both sides see
# the same new value.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: sqlinj
data:
  POSTGRES_DB: "sqlinjproject"
  POSTGRES_USER: "sql_lab_user"
