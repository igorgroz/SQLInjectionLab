services:
  db:
    image: postgres:16
    container_name: sqlinj-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sqlinjproject
      POSTGRES_USER: sql_lab_user
      POSTGRES_PASSWORD: StrongPassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgredb/init:/docker-entrypoint-initdb.d

  backend:
    container_name: sqlinj-backend
    image: ghcr.io/igorgroz/sqlinj-backend:latest
    platform: linux/amd64
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false          # CI doesn't have this file; vars injected via docker-compose.dast.yml + GitHub Secrets
    ports:
      - "5001:5001"
    depends_on:
      - db

  frontend:
    container_name: sqlinj-frontend
    image: ghcr.io/igorgroz/sqlinj-frontend:latest
    platform: linux/amd64
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:8080"   # nginx-unprivileged listens on 8080 (non-privileged port)
    depends_on:
      - backend

volumes:
  postgres_data: