version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 16
    commands:
      - echo "Installing dependencies"
      - ls -al   # Check the directory contents to confirm 'frontend' exists
      - cd frontend
      - npm install
      - pwd

  build:
    commands:
      - echo "Building the React app"
      - ls -al  # Verify the contents of the 'frontend' directory before running build
      - pwd
      # - cd frontend
      - npm run build
      - ls -al

artifacts:
  base-directory: frontend/build    # React build output directory
  files:
    - '**/*'
