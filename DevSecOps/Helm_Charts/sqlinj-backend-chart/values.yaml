# Global settings used across templates
awsRegion: "ap-southeast-2"
awsAccountId: "510151297987" # Your AWS Account ID

namespace:
  name: "sqlinj-backend-ns" # Namespace for your application
  create: true # Helm will try to create it if it doesn't exist (if chart has namespace template or using --create-namespace)

replicaCount: 1

image:
  repository: "510151297987.dkr.ecr.ap-southeast-2.amazonaws.com/my-sqlinj-backend" # Your ECR repo URI
  pullPolicy: IfNotPresent
  # tag: "latest" # Default to latest, can be overridden at install/upgrade
  tag: "1205251806" # Or pin to your specific timestamped tag for this version

# Application specific configuration (mirrors your .env structure)
config:
  containerPort: 5001 # Port your application listens on
  dbHost: "sqlinjproject-db.cymhse7fxmp9.ap-southeast-2.rds.amazonaws.com" # ** YOUR RDS ENDPOINT **
  dbPort: "5432"
  dbName: "sqlinjproject"
  dbSsl: "true" # Use "true" for RDS, your app should handle this
  jwtExpiration: "3600"

# Secrets Management (for ExternalSecrets Operator)
awsSecrets:
  dbSecretNameInSM: "sqlinjproject-db-secret" # Name of DB secret in AWS Secrets Manager
  jwtSecretNameInSM: "jwt-secret"            # Name of JWT secret in AWS Secrets Manager

  # Names for the Kubernetes Secrets that ESO will create from the above
  k8sDbSecretName: "backend-db-credentials"
  k8sJwtSecretName: "backend-jwt-secret"

# SecretStore configuration (used by ExternalSecret resources in this chart)
secretStore:
  name: "aws-app-secrets-store" # Name for the SecretStore CR created by this chart
  # Details of the ServiceAccount used by the ExternalSecretsOperator controller
  # This SA (in 'external-secrets' namespace) needs IRSA permissions to AWS Secrets Manager
  esoControllerServiceAccountName: "external-secrets"
  esoControllerServiceAccountNamespace: "external-secrets"

# Kubernetes Service configuration
service:
  type: ClusterIP
  port: 80 # Port the K8s service will expose

# Kubernetes Ingress configuration (for AWS Load Balancer Controller)
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # For HTTPS (optional, requires ACM certificate):
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-southeast-2:510151297987:certificate/YOUR-ACM-CERT-ID"
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
  path: "/api" # Base path for your backend API (e.g., my-alb.com/api/users)
  pathType: Prefix

# Pod Resource requests and limits
resources: {}
  # limits:
  #   cpu: "0.5" # 0.5 vCPU
  #   memory: "512Mi"
  # requests:
  #   cpu: "0.25"
  #   memory: "256Mi"

# Liveness and Readiness Probes for your application
livenessProbe:
  path: "/healthz" # ** IMPLEMENT THIS HTTP GET ENDPOINT IN YOUR APP **
  initialDelaySeconds: 45 # Give more time for initial startup
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  path: "/readyz" # ** IMPLEMENT THIS HTTP GET ENDPOINT IN YOUR APP **
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3