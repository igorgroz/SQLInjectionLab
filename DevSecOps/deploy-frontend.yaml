AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy frontend to S3 using CodePipeline with GitHub as the source and CodeBuild for the build process.

Resources:
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: clths120325
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::clths120325/*"
            Condition:
              IpAddress:
                aws:SourceIp: "122.107.209.70/32"

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: clths-frontend-build
      Source:
        Type: GITHUB
        Location: https://github.com/igorgroz/SQLInjectionLab
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:5.0
        Type: LINUX_CONTAINER
      Artifacts:
        Type: NO_ARTIFACTS
      Cache:
        Type: NO_CACHE
      TimeoutInMinutes: 10
      BuildSpec: |
        version: 0.2
        phases:
          install:
            runtime-versions:
              nodejs: 18
          build:
            commands:
              - npm install
              - npm run build
              - aws s3 sync build/ s3://clths120325 --delete

  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: clths-frontend-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref S3Bucket
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: igorgroz
                Repo: SQLInjectionLab
                Branch: master
                OAuthToken: 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
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject

  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: [codepipeline.amazonaws.com]
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::clths120325/*"

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket
