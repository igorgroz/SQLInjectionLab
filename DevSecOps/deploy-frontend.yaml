AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy frontend to S3 using CodePipeline with GitHub as the source and manual approval.

Parameters:
  GitHubRepoOwner:
    Type: String
    Default: "igorgroz"
    Description: GitHub repository owner.
  GitHubRepoName:
    Type: String
    Default: "SQLInjectionLab"
    Description: GitHub repository name.
  GitHubBranch:
    Type: String
    Default: "master"
    Description: GitHub branch to deploy from.

Resources:
  # AWS Secrets Manager for GitHub OAuth Token
  GitHubSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: GitHubToken
      Description: GitHub OAuth token for CodePipeline access.
      SecretString: "REPLACE_WITH_YOUR_TOKEN"

  # S3 Bucket for frontend
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: clths120325
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  # Bucket Policy to restrict access to specific IP
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::clths120325/*"
            Condition:
              IpAddress:
                aws:SourceIp: "122.107.209.70/32"

  # IAM Role for CodePipeline
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::clths120325/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref GitHubSecret

  # CodePipeline for deployment
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: clths-frontend-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref S3Bucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: '1'
              Configuration:
                Owner: !Ref GitHubRepoOwner
                Repo: !Ref GitHubRepoName
                Branch: !Ref GitHubBranch
                OAuthToken: "{{resolve:secretsmanager:GitHubToken:SecretString}}"
                PollForSourceChanges: false  # No auto trigger
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Approval
          Actions:
            - Name: ManualApproval
              ActionTypeId:
                Category: Approval
                Owner: AWS
                Provider: Manual
                Version: '1'
              Configuration: {}
        - Name: Deploy
          Actions:
            - Name: DeployToS3
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: S3
                Version: '1'
              Configuration:
                BucketName: !Ref S3Bucket
                Extract: true
              InputArtifacts:
                - Name: SourceOutput

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref S3Bucket